db:
  name: csg-postgres                      # Database cluster name, also used as hostname
  group: csg-postgres                     # Group label for related resources
  instances: 2                            # Number of PostgreSQL servers in the cluster
  size: 512Gi                             # Storage size for the database
  superUser:
    enabled: false                        # Enable superuser access to the database
    usernameKey: csg-pg-rootuser          # Key in OpenBao for superuser username
    passwordKey: csg-pg-rootpasswd        # Key in OpenBao for superuser password
    secretPath: csg/pg-superuser          # Path in OpenBao where superuser credentials are stored
  app:
    name: csg-pg                          # Database name to create during bootstrap
    usernameKey: csg-pg-user              # Key in OpenBao for app user username
    passwordKey: csg-pg-passwd            # Key in OpenBao for app user password
    secretPath: csg/pg-appuser            # Path in OpenBao where app user credentials are stored
